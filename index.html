<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AdoptEase - Plateforme professionnelle d'adoption d'enfants" />
  <title>AdoptEase - Adoption d'Enfants</title>

  <!-- 🛡️ SECURITY HEADERS -->
  <!-- Anti-clickjacking : empêche l'intégration dans des iframes -->
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <!-- Empêche le MIME sniffing -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <!-- Politique de referrer stricte -->
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <!-- Content Security Policy -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.supabase.co https://placehold.co https://flagcdn.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" />
  <!-- Permissions Policy : désactiver les APIs sensibles -->
  <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=(), payment=(), usb=()" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
